<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ShimawaNever{% endblock %} — 蔵置管理システム</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="/" class="navbar-brand">Shimawa<span>Never</span></a>
    <ul class="nav-links">
      <li><a href="/" {% if request.url.path == "/" %}class="active"{% endif %}>ダッシュボード</a></li>
      <li><a href="/records" {% if request.url.path.startswith("/records") %}class="active"{% endif %}>蔵置管理票</a></li>
      <li><a href="/locations" {% if request.url.path.startswith("/locations") %}class="active"{% endif %}>場所マスタ</a></li>
      <li><a href="/issuers" {% if request.url.path.startswith("/issuers") %}class="active"{% endif %}>発行者マスタ</a></li>
      <li><a href="/categories" {% if request.url.path.startswith("/categories") %}class="active"{% endif %}>親分類マスタ</a></li>
      <li class="nav-export"><a href="/export/csv">CSV エクスポート</a></li>
    </ul>
  </div>
</nav>

<div class="main-content">
  {% block content %}{% endblock %}
</div>

<script>
// 削除確認
document.querySelectorAll('form[data-confirm]').forEach(form => {
  form.addEventListener('submit', e => {
    if (!confirm(form.dataset.confirm)) e.preventDefault();
  });
});
</script>
</body>
</html>

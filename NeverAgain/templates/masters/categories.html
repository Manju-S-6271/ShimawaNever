{% extends "base.html" %}
{% block title %}親分類マスタ{% endblock %}
{% block content %}

<div class="page-header">
  <h1>親分類マスタ</h1>
  <span class="subtitle">PARENT CATEGORY MASTER</span>
</div>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:2rem;align-items:start;">

  <div class="card">
    <div class="card-title">分類一覧</div>
    {% if cats %}
    <table>
      <thead>
        <tr>
          <th>分類名</th>
          <th>説明</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        {% for cat in cats %}
        <tr>
          <td>{{ cat.name }}</td>
          <td style="font-size:0.82rem;color:var(--ink-light);">{{ cat.description or '―' }}</td>
          <td>
            <form method="post" action="/categories/{{ cat.id }}/delete"
              data-confirm="分類「{{ cat.name }}」を削除しますか？">
              <button type="submit" class="btn btn-danger btn-sm">削除</button>
            </form>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    {% else %}
    <div class="empty-state" style="padding:2rem;">
      <p>親分類が登録されていません。</p>
    </div>
    {% endif %}
  </div>

  <div class="card">
    <div class="card-title">新規分類を追加</div>
    <form method="post" action="/categories/new">
      <div class="form-group">
        <label>分類名 <span class="req">*</span></label>
        <input type="text" name="name" required placeholder="例: 行政文書、金融書類、技術資料">
      </div>
      <div class="form-group">
        <label>説明</label>
        <textarea name="description" placeholder="この分類に含まれる書類の説明"></textarea>
      </div>
      <button type="submit" class="btn btn-primary">追加</button>
    </form>
  </div>

</div>
{% endblock %}
